services:
  server:
    build:
      context: ./server
    env_file:
      - .env
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
